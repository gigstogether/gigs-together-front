name: Merge main to stg

on:
  push:
    branches:
      - main

jobs:
  merge-main-to-stg:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge main into stg
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout stg
          git merge main -m "chore: merge main into stg [automated]"
          git push origin stg
